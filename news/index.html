<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="中科同志科技新闻动态 - 半导体封装设备行业资讯、技术动态、公司新闻">
    <title>新闻动态 - 中科同志科技（TORCH）</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-header {
            background: linear-gradient(135deg, #0056B3 0%, #003366 100%);
            color: white;
            padding: 120px 0 80px;
            text-align: center;
        }
        .page-header h1 { font-size: 48px; margin-bottom: 20px; }
        .page-header p { font-size: 20px; opacity: 0.9; }
        .news-section { padding: 80px 0; }
        .news-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 25px;
            border: 2px solid #0056B3;
            background: white;
            color: #0056B3;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover,
        .filter-btn.active {
            background: #0056B3;
            color: white;
        }
        .news-list { max-width: 900px; margin: 0 auto; }
        .news-item {
            display: flex;
            gap: 30px;
            padding: 30px;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.3s;
        }
        .news-item:hover { background: #f5f5f5; }
        .news-item-image {
            width: 200px;
            height: 140px;
            background: #0056B3;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            flex-shrink: 0;
        }
        .news-item-content { flex: 1; }
        .news-category {
            display: inline-block;
            padding: 4px 12px;
            background: #0056B3;
            color: white;
            font-size: 12px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .news-item-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
        }
        .news-item-excerpt {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .news-item-meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #999;
        }
        .news-item-link {
            color: #0056B3;
            font-weight: 600;
            margin-top: 10px;
            display: inline-block;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <span class="logo-text" style="display:block">TORCH 中科同志</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/">首页</a></li>
                <li><a href="/about/">关于我们</a></li>
                <li><a href="/products/">产品中心</a></li>
                <li><a href="/applications/">技术应用</a></li>
                <li><a href="/news/" class="active">新闻动态</a></li>
                <li><a href="/resources/">资源下载</a></li>
                <li><a href="/contact/">联系我们</a></li>
            </ul>
        </div>
    </nav>

    <!-- 页面头部 -->
    <section class="page-header">
        <div class="container">
            <h1>新闻动态</h1>
            <p>行业资讯 · 技术动态 · 公司新闻</p>
        </div>
    </section>

    <!-- 新闻列表 -->
    <section class="news-section">
        <div class="container">
            <!-- 筛选器 -->
            <div class="news-filter">
                <button class="filter-btn active" onclick="filterNews('all')">全部</button>
                <button class="filter-btn" onclick="filterNews('行业动态')">行业动态</button>
                <button class="filter-btn" onclick="filterNews('技术动态')">技术动态</button>
                <button class="filter-btn" onclick="filterNews('公司新闻')">公司新闻</button>
            </div>

            <!-- 新闻列表 -->
            <div class="news-list" id="news-list">
                <div class="empty-state">
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-section">
                    <h4>关于 TORCH</h4>
                    <p>中科同志科技股份有限公司，专注半导体特种封装设备近 20 年。</p>
                </div>
                <div class="footer-section">
                    <h4>快速链接</h4>
                    <ul>
                        <li><a href="/products/">产品中心</a></li>
                        <li><a href="/applications/">技术应用</a></li>
                        <li><a href="/news/">新闻动态</a></li>
                        <li><a href="/contact/">联系我们</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>联系方式</h4>
                    <ul>
                        <li>📍 北京市通州区联东 U 谷科技园中区景盛南四街 15 号</li>
                        <li>📞 400-998-9522</li>
                        <li>📧 sales@tonzh.com</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 中科同志科技股份有限公司 版权所有</p>
            </div>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        let allNews = [];
        let currentFilter = 'all';

        // 加载新闻
        function loadNews() {
            const timestamp = new Date().getTime();
            fetch('/admin/news.json?t=' + timestamp)
                .then(r => r.json())
                .then(news => {
                    allNews = news;
                    renderNews();
                })
                .catch(e => {
                    document.getElementById('news-list').innerHTML = '<div class="empty-state"><p>加载失败，请稍后重试</p></div>';
                    console.error('加载新闻失败:', e);
                });
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('news-list');
            const filtered = currentFilter === 'all' 
                ? allNews 
                : allNews.filter(n => n.category === currentFilter);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>暂无新闻</p></div>';
                return;
            }

            container.innerHTML = filtered.map(item => `
                <article class="news-item">
                    <div class="news-item-image">📰</div>
                    <div class="news-item-content">
                        <span class="news-category">${item.category || '行业动态'}</span>
                        <h3 class="news-item-title">${item.title || '新闻标题'}</h3>
                        <p class="news-item-excerpt">${item.excerpt || item.content ? (item.excerpt || item.content).substring(0, 150) + '...' : ''}</p>
                        <div class="news-item-meta">
                            <span>📅 ${item.date || '2026-03-12'}</span>
                            <span>👁️ ${item.views || 0} 阅读</span>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        // 筛选新闻
        function filterNews(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(category) || (category === 'all' && btn.textContent === '全部'));
            });
            renderNews();
        }

        // 页面加载时获取新闻
        loadNews();
    </script>
</body>
</html>
